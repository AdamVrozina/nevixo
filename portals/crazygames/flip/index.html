<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FLIP</title>
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
  :root{
    --ink:#F2F2F5; --bg:#0E0F13; --field:#15171D; --bar:#2A2D36;
    --accent:#2BE4C6; --violet:#8B7CFF; --coin:#FFC24B; --danger:#FF5C5C; --muted:#8A8F9C;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    display:flex; flex-direction:column; align-items:center;
    padding:16px; gap:12px; overscroll-behavior:none;
  }
  header{display:flex; align-items:center; gap:10px; width:100%; max-width:760px}
  .mark{width:30px;height:30px;border:2px solid var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center}
  .mark::after{content:"";border-left:10px solid var(--accent);border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px}
  header h1{font-size:17px;font-weight:600;letter-spacing:2.5px}
  header span{font-size:12px;color:var(--muted);margin-left:auto;letter-spacing:2px}
  .mute{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px;margin-left:10px;line-height:1}
  .mute:active{transform:scale(.9)}
  #stage{position:relative; width:100%; max-width:760px}
  canvas{display:block; width:100%; border-radius:20px; background:var(--field);
    box-shadow:0 0 0 1px #23262E; touch-action:none}
  .hud{position:absolute; top:14px; left:18px; right:18px; display:flex;
    justify-content:space-between; pointer-events:none; font-size:14px; font-weight:600}
  .hud .right{color:var(--muted); font-weight:500; display:flex; gap:14px}
  .hud .coins{color:var(--coin)}
  .panel{position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; text-align:center;
    background:rgba(14,15,19,.86); border-radius:20px; padding:24px}
  .panel h2{font-size:26px; font-weight:700; letter-spacing:-.5px}
  .panel p{font-size:14px; color:var(--muted); max-width:300px; line-height:1.5}
  .stats{display:flex; gap:26px; font-size:14px; color:var(--muted)}
  .stats b{display:block; font-size:22px; color:var(--ink)}
  button{font:inherit; font-size:15px; font-weight:600; border:none; cursor:pointer;
    padding:12px 26px; border-radius:14px; background:var(--ink); color:#0E0F13}
  button:active{transform:scale(.97)}
  button.reward{background:var(--accent); color:#06322B}
  button.ghost{background:transparent; color:var(--muted); font-weight:500; padding:6px}
  button:disabled{opacity:.35; pointer-events:none}
  .adtag{font-size:11px; font-weight:500; letter-spacing:.6px; opacity:.8}
  .hidden{display:none !important}

  #skins{overflow-y:auto; justify-content:flex-start; gap:8px; padding:14px}
  #skins h2{font-size:20px}
  .coinbal{font-size:13px; color:var(--coin); font-weight:600}
  .skingrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px 8px; width:100%; max-width:340px}
  .skin-card{display:flex; flex-direction:column; align-items:center; gap:4px}
  .skin-preview{width:28px; height:28px; border-radius:50%}
  .skin-preview.classic{background:var(--ink)}
  .skin-preview.teal{background:var(--accent)}
  .skin-preview.violet{background:var(--violet)}
  .skin-preview.gold{background:var(--coin)}
  .skin-preview.dual{background:linear-gradient(to bottom,var(--violet),var(--accent))}
  .skin-preview.halo{background:var(--accent); box-shadow:0 0 0 3px rgba(43,228,198,.35),0 0 12px 2px rgba(43,228,198,.55)}
  .skin-name{font-size:12px; color:var(--muted)}
  .skin-btn{font:inherit; font-size:11px; font-weight:600; padding:5px 8px; border-radius:8px;
    border:none; cursor:pointer; background:var(--ink); color:#0E0F13; min-width:62px}
  .skin-btn.sel{background:var(--accent); color:#06322B}
  .skin-btn.buy{background:var(--field); color:var(--coin); border:1px solid var(--line)}
  .skin-btn.ad{background:transparent; color:var(--accent); border:1px solid var(--accent)}
  .skin-btn:disabled{opacity:.4; cursor:default}
</style>
</head>
<body>

<header>
  <div class="mark" aria-hidden="true"></div>
  <h1>FLIP</h1>
  <span>NEVIXO</span>
  <button class="mute" id="muteBtn" aria-label="Toggle sound">🔊</button>
</header>

<div id="stage">
  <canvas id="game"></canvas>
  <div class="hud">
    <div id="score">0 m</div>
    <div class="right"><span class="coins" id="coins">◉ 0</span><span id="best">Best 0 m</span></div>
  </div>

  <div class="panel" id="menu">
    <h2>FLIP</h2>
    <p>Tap, click or press Space to flip gravity. Dodge the blocks, grab the coins, go far.</p>
    <button id="startBtn">Play</button>
    <button id="skinsBtn" class="ghost">Skins · ◉ <span id="menuCoins">0</span></button>
    <a href="https://playnevixo.com/privacy.html" target="_blank" rel="noopener" style="font-size:11px; color:var(--muted); text-decoration:underline; margin-top:4px">Privacy &amp; Terms</a>
  </div>

  <div class="panel hidden" id="over">
    <h2>Crashed</h2>
    <div class="stats">
      <div><b id="finalScore">0</b>meters</div>
      <div><b id="finalCoins">0</b>coins</div>
      <div><b id="finalBest">0</b>best</div>
    </div>
    <button class="reward" id="reviveBtn">▶ Watch ad to revive <span class="adtag">AD</span></button>
    <button class="reward" id="doubleBtn">▶ Double coins <span class="adtag">AD</span></button>
    <button id="againBtn">Play again</button>
    <button id="menuBtn" class="ghost">Menu &amp; skins</button>
  </div>

  <div class="panel hidden" id="skins">
    <h2>Skins</h2>
    <div class="coinbal">◉ <span id="skinCoins">0</span> coins</div>
    <div class="skingrid" id="skinGrid"></div>
    <button id="skinBackBtn" class="ghost">Back</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const ui = {
    score: document.getElementById('score'), coins: document.getElementById('coins'),
    best: document.getElementById('best'), menu: document.getElementById('menu'),
    over: document.getElementById('over'), finalScore: document.getElementById('finalScore'),
    finalCoins: document.getElementById('finalCoins'), finalBest: document.getElementById('finalBest'),
    reviveBtn: document.getElementById('reviveBtn'), doubleBtn: document.getElementById('doubleBtn'),
    againBtn: document.getElementById('againBtn'), startBtn: document.getElementById('startBtn'),
    skinsBtn: document.getElementById('skinsBtn'), menuCoins: document.getElementById('menuCoins'),
    menuBtn: document.getElementById('menuBtn'), skins: document.getElementById('skins'),
    skinCoins: document.getElementById('skinCoins'), skinGrid: document.getElementById('skinGrid'),
    skinBackBtn: document.getElementById('skinBackBtn'), muteBtn: document.getElementById('muteBtn')
  };
  const css = getComputedStyle(document.documentElement);
  const C = n => css.getPropertyValue(n).trim();

  function track(){}  // analytics runs through the CrazyGames SDK on this build

  // --- CrazyGames SDK helpers ---
  const CG = () => (window.CrazyGames && window.CrazyGames.SDK) || null;
  function gameplay(on){
    const s = CG(); if (!s || !s.game) return;
    try { on ? s.game.gameplayStart() : s.game.gameplayStop(); } catch(e){}
  }

  // --- Ad abstraction: CrazyGames video ads. Rewarded grants only on adFinished. ---
  const Ads = {
    interstitial(done){
      const s = CG();
      if (!s || !s.ad){ done(); return; }
      Sound.duckForAd(true);
      s.ad.requestAd('midgame', {
        adError: () => { Sound.duckForAd(false); done(); },
        adFinished: () => { Sound.duckForAd(false); done(); }
      });
    },
    rewarded(done){
      const s = CG();
      if (!s || !s.ad){ done(); return; }  // no SDK (dev only): grant so it's testable
      Sound.duckForAd(true);
      s.ad.requestAd('rewarded', {
        adError: () => { Sound.duckForAd(false); },        // not filled / blocked: no reward
        adFinished: () => { Sound.duckForAd(false); done(); }
      });
    }
  };

  // --- Sound: Web Audio synthesized SFX, no files. ---
  const Sound = {
    ctx: null, master: null, muted: false,
    init(){
      if (this.ctx) return;
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.5;
        this.master.connect(this.ctx.destination);
      } catch(e){ this.ctx = null; }
    },
    loadMuted(){ try { this.muted = localStorage.getItem('nevixo_muted') === '1'; } catch(e){} },
    toggle(btn){
      this.muted = !this.muted;
      try { localStorage.setItem('nevixo_muted', this.muted ? '1' : '0'); } catch(e){}
      if (btn) btn.textContent = this.muted ? '🔇' : '🔊';
    },
    resume(){ if (this.ctx && this.ctx.state !== 'running') this.ctx.resume().catch(() => {}); },
    // Safari/iOS (esp. inside an iframe) need a silent buffer played within a gesture to unlock audio.
    unlock(){
      this.init(); if (!this.ctx) return;
      if (this.ctx.state !== 'running') this.ctx.resume().catch(() => {});
      if (this._unlocked) return; this._unlocked = true;
      try { const b = this.ctx.createBuffer(1, 1, 22050), s = this.ctx.createBufferSource(); s.buffer = b; s.connect(this.ctx.destination); s.start(0); } catch(e){}
    },
    duckForAd(on){ try { if (this.master && this.ctx) this.master.gain.setValueAtTime(on ? 0 : 0.5, this.ctx.currentTime); } catch(e){} },
    tone(freq, dur, type, when, vol){
      if (this.muted) return;
      this.init(); if (!this.ctx) return;
      if (this.ctx.state !== 'running') this.ctx.resume();
      const t0 = this.ctx.currentTime + (when || 0);
      const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol || 0.3, t0 + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g); g.connect(this.master);
      osc.start(t0); osc.stop(t0 + dur + 0.03);
    },
    blip(freq, dur, type, vol){ this.tone(freq, dur || 0.09, type || 'triangle', 0, vol || 0.25); },
    arp(freqs, step, dur, type, vol){ freqs.forEach((f, i) => this.tone(f, dur || 0.12, type || 'triangle', i * (step || 0.06), vol || 0.22)); },
    sweep(f1, f2, dur, type, vol){
      if (this.muted) return;
      this.init(); if (!this.ctx) return;
      if (this.ctx.state !== 'running') this.ctx.resume();
      const t0 = this.ctx.currentTime;
      const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
      osc.type = type || 'sawtooth';
      osc.frequency.setValueAtTime(f1, t0);
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, f2), t0 + dur);
      g.gain.setValueAtTime(vol || 0.3, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g); g.connect(this.master);
      osc.start(t0); osc.stop(t0 + dur + 0.03);
    }
  };

  // --- Cosmetic skins ---
  const SKINS = [
    { id:'classic', name:'Classic', price:0 },
    { id:'teal',    name:'Teal',    price:20,  color:'--accent' },
    { id:'violet',  name:'Violet',  price:40,  color:'--violet' },
    { id:'gold',    name:'Gold',    price:80,  color:'--coin' },
    { id:'dual',    name:'Dual',    price:150 },
    { id:'halo',    name:'Halo',    ad:true,   color:'--accent' }
  ];

  // --- State ---
  let W = 0, H = 0, dpr = 1, pad = 12, barTh = 6;
  let state = 'menu';               // menu | playing | dead
  let ball, speed, dist, runCoins, obstacles, coinsArr, nextObst, gravDir;
  let bestDist = 0, bank = 0, runCount = 0, usedRevive = false, usedDouble = false;
  let invincible = 0, last = 0, runBanked = false;
  let ownedSkins = ['classic'], selectedSkin = 'classic';

  const SAVE_KEY = 'flip_save';
  function save(){
    try { localStorage.setItem(SAVE_KEY, JSON.stringify({ bank, bestDist, ownedSkins, selectedSkin })); } catch(e){}
  }
  function load(){
    try {
      const s = JSON.parse(localStorage.getItem(SAVE_KEY));
      if (!s) return;
      bank = s.bank || 0;
      bestDist = s.bestDist || 0;
      ownedSkins = (Array.isArray(s.ownedSkins) && s.ownedSkins.length) ? s.ownedSkins : ['classic'];
      selectedSkin = s.selectedSkin || 'classic';
      if (!ownedSkins.includes(selectedSkin)) selectedSkin = 'classic';
    } catch(e){}
  }
  function bankRun(){
    if (runBanked) return;
    bank += runCoins; runBanked = true; save();
  }

  const BASE_SPEED = 300, MAX_SPEED = 700, ACCEL = 7;
  const GRAV = 3300, MAX_VY = 1300;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.clientWidth;
    H = Math.max(300, Math.min(Math.round(W * 0.56), Math.round(window.innerHeight * 0.62)));
    canvas.style.height = H + 'px';
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (ball){ ball.x = W * 0.26; ball.y = clampY(ball.y); }
  }
  const floorY = () => H - pad - barTh;
  const ceilY  = () => pad + barTh;
  function clampY(y){ const r = ballR(); return Math.min(Math.max(y, ceilY() + r), floorY() - r); }
  const ballR = () => Math.max(10, Math.round(H * 0.032));

  function reset(fullRun){
    if (fullRun){ dist = 0; runCoins = 0; usedRevive = false; usedDouble = false; speed = BASE_SPEED; }
    obstacles = []; coinsArr = []; nextObst = W * 0.9; gravDir = 1;
    ball = { x: W * 0.26, y: floorY() - ballR(), vy: 0, rot: 0 };
  }

  function spawnObstacle(){
    const r = ballR();
    const onFloor = Math.random() < 0.5;
    const h = H * (0.14 + Math.random() * 0.16);
    const w = Math.max(22, H * 0.055);
    const y = onFloor ? floorY() - h : ceilY();
    obstacles.push({ x: W + w, y, w, h, top: !onFloor });
    const flipT = Math.sqrt(2 * (floorY() - ceilY() - 2 * r) / GRAV);
    nextObst = speed * (flipT + 0.55 + Math.random() * 0.5);
    if (Math.random() < 0.35){
      const cy = onFloor ? ceilY() + r * 2.2 : floorY() - r * 2.2;
      for (let i = 0; i < 3; i++) coinsArr.push({ x: W + w + 60 + i * 34, y: cy, r: Math.max(7, H*0.018), hit:false });
    }
  }

  function flip(){
    if (state !== 'playing') return;
    gravDir *= -1;
    Sound.blip(gravDir > 0 ? 300 : 480, 0.07, 'triangle', 0.2);
  }

  function die(){
    state = 'dead'; runCount++;
    gameplay(false);
    Sound.sweep(320, 70, 0.35, 'sawtooth', 0.26);
    bestDist = Math.max(bestDist, meters());
    save();
    ui.finalScore.textContent = meters();
    ui.finalCoins.textContent = runCoins;
    ui.finalBest.textContent = bestDist;
    ui.reviveBtn.disabled = usedRevive;
    ui.doubleBtn.disabled = usedDouble || runCoins === 0;
    ui.over.classList.remove('hidden');
  }

  const meters = () => Math.floor(dist / 40);

  function update(dt){
    speed = Math.min(MAX_SPEED, speed + ACCEL * dt);
    const dx = speed * dt;
    dist += dx;
    if (invincible > 0) invincible -= dt;

    ball.vy += GRAV * gravDir * dt;
    ball.vy = Math.max(-MAX_VY, Math.min(MAX_VY, ball.vy));
    ball.y += ball.vy * dt;
    const r = ballR();
    if (ball.y > floorY() - r){ ball.y = floorY() - r; ball.vy = 0; }
    if (ball.y < ceilY() + r){ ball.y = ceilY() + r; ball.vy = 0; }
    ball.rot += (dx / r) * (ball.y > H/2 ? 1 : -1);

    nextObst -= dx;
    if (nextObst <= 0) spawnObstacle();

    for (const o of obstacles) o.x -= dx;
    for (const c of coinsArr) c.x -= dx;
    obstacles = obstacles.filter(o => o.x + o.w > -20);
    coinsArr = coinsArr.filter(c => c.x > -20 && !c.hit);

    for (const c of coinsArr){
      if (Math.hypot(c.x - ball.x, c.y - ball.y) < c.r + r){ c.hit = true; runCoins++; Sound.blip(1180, 0.08, 'square', 0.14); }
    }
    if (invincible <= 0){
      for (const o of obstacles){
        const cx = Math.max(o.x, Math.min(ball.x, o.x + o.w));
        const cy = Math.max(o.y, Math.min(ball.y, o.y + o.h));
        if (Math.hypot(cx - ball.x, cy - ball.y) < r * 0.92){ die(); return; }
      }
    }
    ui.score.textContent = meters() + ' m';
    ui.coins.textContent = '◉ ' + (bank + runCoins);
    ui.best.textContent = 'Best ' + Math.max(bestDist, meters()) + ' m';
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = C('--bar');
    ctx.beginPath(); roundRect(pad, pad, W - pad*2, barTh, 3); ctx.fill();
    ctx.beginPath(); roundRect(pad, H - pad - barTh, W - pad*2, barTh, 3); ctx.fill();

    for (const o of obstacles){
      ctx.fillStyle = C(o.top ? '--violet' : '--accent');
      ctx.beginPath(); roundRect(o.x, o.y, o.w, o.h, 6); ctx.fill();
    }

    ctx.fillStyle = C('--coin');
    for (const c of coinsArr){ ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, 7); ctx.fill(); }

    const r = ballR();
    const blink = invincible > 0 && Math.floor(invincible * 10) % 2 === 0;
    ctx.globalAlpha = blink ? 0.35 : 1;
    drawBall(ball.x, ball.y, r, ball.rot);
    ctx.globalAlpha = 1;
  }

  function drawBall(x, y, r, rot){
    const skin = SKINS.find(s => s.id === selectedSkin) || SKINS[0];
    if (skin.id === 'dual'){
      const g = ctx.createLinearGradient(x, y - r, x, y + r);
      g.addColorStop(0, C('--violet')); g.addColorStop(1, C('--accent'));
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = C(skin.color || '--ink');
    }
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    if (skin.id === 'halo'){
      ctx.lineWidth = Math.max(2, r * 0.16); ctx.strokeStyle = C('--accent');
      ctx.beginPath(); ctx.arc(x, y, r + ctx.lineWidth, 0, 7); ctx.stroke();
    }
    ctx.fillStyle = skin.id === 'classic' ? C('--field') : 'rgba(14,15,19,.55)';
    ctx.beginPath(); ctx.arc(x + Math.cos(rot) * r * 0.5, y + Math.sin(rot) * r * 0.5, r * 0.18, 0, 7); ctx.fill();
  }

  function roundRect(x, y, w, h, rr){
    rr = Math.min(rr, w/2, h/2);
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr); ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr); ctx.arcTo(x, y, x+w, y, rr);
  }

  function loop(ts){
    const dt = Math.min(0.033, (ts - last) / 1000 || 0);
    last = ts;
    if (state === 'playing') update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function startRun(){
    reset(true); runBanked = false;
    ui.menu.classList.add('hidden'); ui.over.classList.add('hidden'); ui.skins.classList.add('hidden');
    state = 'playing';
    gameplay(true);
    Sound.blip(520, 0.07, 'sine', 0.16);
  }

  function showMenu(){
    reset(true);
    gameplay(false);
    ui.over.classList.add('hidden'); ui.skins.classList.add('hidden'); ui.menu.classList.remove('hidden');
    ui.menuCoins.textContent = bank;
    state = 'menu';
  }

  function renderSkins(){
    ui.skinCoins.textContent = bank;
    ui.skinGrid.innerHTML = SKINS.map(s => {
      const owned = ownedSkins.includes(s.id);
      const selected = selectedSkin === s.id;
      let btn;
      if (selected) btn = '<button class="skin-btn sel" disabled>Selected</button>';
      else if (owned) btn = `<button class="skin-btn" data-select="${s.id}">Select</button>`;
      else if (s.ad) btn = `<button class="skin-btn ad" data-adunlock="${s.id}">▶ Watch ad</button>`;
      else btn = `<button class="skin-btn buy" data-buy="${s.id}" ${bank >= s.price ? '' : 'disabled'}>${s.price} ◉</button>`;
      return `<div class="skin-card"><div class="skin-preview ${s.id}"></div><div class="skin-name">${s.name}</div>${btn}</div>`;
    }).join('');
  }

  // --- Wiring ---
  ui.startBtn.addEventListener('click', startRun);
  ui.againBtn.addEventListener('click', () => {
    bankRun();
    const go = () => startRun();
    (runCount % 2 === 0) ? Ads.interstitial(go) : go();   // interstitial every 2nd run
  });
  ui.menuBtn.addEventListener('click', () => { bankRun(); showMenu(); });
  ui.skinsBtn.addEventListener('click', () => {
    renderSkins();
    ui.menu.classList.add('hidden'); ui.skins.classList.remove('hidden');
  });
  ui.skinBackBtn.addEventListener('click', showMenu);
  ui.skinGrid.addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    const buy = btn.dataset.buy, sel = btn.dataset.select, ad = btn.dataset.adunlock;
    if (sel){ selectedSkin = sel; save(); renderSkins(); Sound.blip(560, 0.05, 'sine', 0.14); }
    else if (buy){
      const skin = SKINS.find(s => s.id === buy);
      if (skin && bank >= skin.price){
        bank -= skin.price; ownedSkins.push(buy); selectedSkin = buy;
        save(); renderSkins();
        Sound.arp([660, 990], 0.05, 0.1, 'triangle', 0.18);
      }
    } else if (ad){
      Ads.rewarded(() => {
        if (!ownedSkins.includes(ad)) ownedSkins.push(ad);
        selectedSkin = ad; save(); renderSkins();
        Sound.arp([660, 990], 0.05, 0.1, 'triangle', 0.18);
      });
    }
  });
  ui.reviveBtn.addEventListener('click', () => {
    Ads.rewarded(() => {
      usedRevive = true;
      Sound.arp([440, 660, 880], 0.06, 0.12, 'triangle', 0.2);
      obstacles = obstacles.filter(o => o.x > ball.x + W * 0.5);
      invincible = 1.2;
      ui.over.classList.add('hidden');
      state = 'playing';
      gameplay(true);
    });
  });
  ui.doubleBtn.addEventListener('click', () => {
    Ads.rewarded(() => { runCoins *= 2; usedDouble = true;
      ui.finalCoins.textContent = runCoins; ui.doubleBtn.disabled = true;
      ui.coins.textContent = '◉ ' + (bank + runCoins);
    });
  });
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); flip(); });
  window.addEventListener('keydown', e => {
    if (e.code === 'Space'){ e.preventDefault(); state === 'menu' ? startRun() : flip(); }
  });
  document.addEventListener('visibilitychange', () => { if (document.hidden && state === 'playing') die(); else if (!document.hidden) Sound.resume(); });
  window.addEventListener('resize', resize);
  window.addEventListener('beforeunload', () => { if (state !== 'menu') bankRun(); });

  Sound.loadMuted();
  ui.muteBtn.textContent = Sound.muted ? '🔇' : '🔊';
  ui.muteBtn.addEventListener('click', () => { Sound.toggle(ui.muteBtn); if (!Sound.muted) Sound.blip(600, 0.05, 'sine', 0.14); });
  ['pointerdown', 'keydown', 'touchstart'].forEach(ev => window.addEventListener(ev, () => Sound.unlock(), { passive: true }));

  load();
  resize(); reset(true); requestAnimationFrame(loop);
  ui.menuCoins.textContent = bank;
  ui.coins.textContent = '◉ ' + bank;
  ui.best.textContent = 'Best ' + bestDist + ' m';

  // --- Init CrazyGames SDK: mark loaded, gameplay stopped on the menu ---
  (async () => {
    const s = CG(); if (!s) return;
    try { await s.init(); } catch(e){ return; }
    try { s.game.loadingStop(); } catch(e){}
    gameplay(false);
  })();
})();
</script>
</body>
</html>
